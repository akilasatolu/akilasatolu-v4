name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main # mainブランチへのpush時に実行

# OIDC用の権限設定
permissions:
  id-token: write  # OIDCトークンの取得に必要
  contents: read   # リポジトリの読み取りに必要

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Dockerを使用してビルド
      - name: Build Docker image (production)
        run: |
          docker build --target build -t akilasatolu-app .

      # 3. ビルド成果物の取り出し
      - name: Extract build artifacts
        run: |
          docker create --name extract akilasatolu-app
          docker cp extract:/app/dist ./dist
          docker rm -f extract

      # 4. AWS認証情報の設定（OIDC）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 5. S3へのアップロード
      - name: Sync to S3
        run: |
          aws s3 sync ./dist s3://${{ secrets.S3_BUCKET }} --delete --exclude "akilasatolu.json" --exclude "photos/*"

      # 6. CloudFrontのキャッシュ無効化
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"